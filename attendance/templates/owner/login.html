<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Owner Sign In — Church Attendance</title>
  <meta name="description" content="Church owner admin login portal." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:      #0f1117;
      --surface: #1a1d27;
      --border:  rgba(255,255,255,0.08);
      --accent:  #6c63ff;
      --accent2: #48cfc6;
      --text:    #e8eaf6;
      --muted:   #7b82a6;
      --red:     #f87171;
      --input-bg:#22263a;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    /* Subtle animated grid background */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(108,99,255,.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(108,99,255,.04) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none;
    }

    .login-card {
      width: 100%;
      max-width: 420px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 48px 40px;
      position: relative;
      z-index: 1;
      box-shadow: 0 24px 60px rgba(0,0,0,.5);
      animation: fadeUp .4s ease both;
    }

    @keyframes fadeUp {
      from { opacity:0; transform: translateY(18px); }
      to   { opacity:1; transform: translateY(0); }
    }

    .church-icon {
      width: 60px; height: 60px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      border-radius: 16px;
      display: flex; align-items: center; justify-content: center;
      font-size: 26px;
      margin: 0 auto 24px;
      box-shadow: 0 8px 24px rgba(108,99,255,.35);
    }

    .login-card h1 {
      font-size: 22px;
      font-weight: 700;
      color: var(--text);
      text-align: center;
      margin-bottom: 6px;
    }

    .login-card p {
      text-align: center;
      font-size: 13.5px;
      color: var(--muted);
      margin-bottom: 32px;
    }

    .error-box {
      background: rgba(248,113,113,.1);
      border: 1px solid rgba(248,113,113,.3);
      border-radius: 10px;
      padding: 12px 16px;
      color: var(--red);
      font-size: 13px;
      margin-bottom: 24px;
      display: flex;
      align-items: flex-start;
      gap: 10px;
    }

    .form-group {
      margin-bottom: 18px;
    }

    label {
      display: block;
      font-size: 12.5px;
      font-weight: 600;
      color: var(--muted);
      margin-bottom: 7px;
      letter-spacing: .02em;
    }

    input[type="text"], input[type="password"] {
      width: 100%;
      background: var(--input-bg);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 12px 14px;
      color: var(--text);
      font-size: 14px;
      font-family: 'Inter', sans-serif;
      outline: none;
      transition: border-color .2s, box-shadow .2s;
    }

    input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(108,99,255,.15);
    }

    .submit-btn {
      width: 100%;
      margin-top: 8px;
      padding: 13px;
      background: linear-gradient(135deg, var(--accent), #8b7cff);
      border: none;
      border-radius: 10px;
      color: #fff;
      font-size: 14.5px;
      font-weight: 600;
      font-family: 'Inter', sans-serif;
      cursor: pointer;
      transition: opacity .2s, transform .15s;
      box-shadow: 0 6px 20px rgba(108,99,255,.35);
    }

    .submit-btn:hover { opacity: .92; transform: translateY(-1px); }
    .submit-btn:active { transform: translateY(0); }

    .footer-note {
      margin-top: 28px;
      text-align: center;
      font-size: 12px;
      color: var(--muted);
    }
  </style>
</head>
<body>
  <div class="login-card">
    <div class="church-icon">⛪</div>
    <h1>Owner Sign In</h1>
    <p>Enter your credentials to access the church dashboard.</p>

    {% if error %}
    <div class="error-box">
      <span>⚠️</span>
      <span>{{ error }}</span>
    </div>
    {% endif %}

    <form method="POST" id="login-form">
      {% csrf_token %}

      <div class="form-group">
        <label for="username">Username</label>
        <input
          type="text"
          id="username"
          name="username"
          placeholder="Enter your username"
          autocomplete="username"
          autofocus
          required
        />
      </div>

      <div class="form-group">
        <label for="password">Password</label>
        <input
          type="password"
          id="password"
          name="password"
          placeholder="Enter your password"
          autocomplete="current-password"
          required
        />
      </div>

      <button type="submit" class="submit-btn">Sign In as Owner →</button>
    </form>

    <p class="footer-note">
      Only registered church owner accounts can log in here.
    </p>
  </div>
</body>
</html>
