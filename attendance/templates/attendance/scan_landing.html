{% extends "attendance/member_base.html" %}
{% block title %}Check-In — {{ event.name }}{% endblock %}

{% block content %}
<div style="text-align:center; margin-bottom:24px;">
  <div class="icon-badge icon-badge-blue" style="font-size:28px;">📲</div>
  <h2>Check-In</h2>
  <p class="subtitle">Welcome to <strong style="color:var(--text);">{{ event.name }}</strong></p>
</div>

{% if error %}
<div class="alert alert-error">⚠️ {{ error }}</div>
{% endif %}

<form method="POST">
  {% csrf_token %}

  <div class="form-group">
    <label for="name">Full Name</label>
    <input
      type="text"
      id="name"
      name="name"
      class="form-input"
      placeholder="Enter your full name"
      value="{{ request.POST.name|default_if_none:'' }}"
      required
      autofocus
    >
  </div>

  <div class="form-group">
    <label for="phone_number">Phone Number</label>
    <input
      type="tel"
      id="phone_number"
      name="phone_number"
      class="form-input"
      placeholder="e.g., 0501234567"
      value="{{ request.POST.phone_number|default_if_none:'' }}"
      required
    >
  </div>

  <div class="form-group" style="margin-top: 16px;">
    <label style="display: flex; align-items: center; gap: 8px; font-weight: normal; cursor: pointer;">
      <input type="checkbox" id="is_visitor" name="is_visitor" style="width: auto; height: auto;">
      I am a first-time visitor / guest (Not a permanent member)
    </label>
  </div>

  <button type="submit" class="btn btn-primary" style="margin-top:24px;">
    Submit Attendance →
  </button>
</form>
{% endblock %}
