{% extends "attendance/member_base.html" %}
{% block title %}Check-In Successful{% endblock %}

{% block content %}
<div style="text-align:center;">
  <div class="icon-badge icon-badge-green" style="font-size:32px; margin-bottom:20px;">✓</div>
  <h2>Success!</h2>
  <p class="subtitle" style="margin-top:10px;">{{ message }}</p>

  {% if event and event.church %}
  <a href="{% url 'attendance:church_events' event.church.uuid %}"
     class="btn btn-ghost"
     style="max-width:260px; margin: 28px auto 0;">
    ← Back to Events
  </a>
  {% endif %}
</div>
{% endblock %}
