<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Confirm Phone</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body class="bg-slate-50 min-h-screen p-6 flex items-center justify-center">
    <div class="bg-white p-8 rounded-2xl shadow-sm border border-slate-100 max-w-md w-full">
        <h3 class="text-xl font-bold text-slate-800">Phone number matches a profile</h3>
        <p class="text-slate-500 text-sm mt-1">We have a profile for <strong>{{ member.name }}</strong> with phone <strong>{{ masked_phone }}</strong>.</p>

        <form method="POST" action="{% url 'confirm_identity' event.id member.id %}" class="mt-4">
            {% csrf_token %}
            <button type="submit" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-medium p-3 rounded-lg transition">Confirm and Check In</button>
        </form>
        <div class="mt-4 space-y-3">
            <div class="text-sm text-slate-600">If this isn't you, choose one of the options below:</div>

            <a href="{% url 'onboard_member' event.id %}?name={{ typed_name|urlencode }}&phone={{ typed_phone|urlencode }}" class="w-full block text-center bg-amber-500 hover:bg-amber-600 text-white font-medium p-3 rounded-lg transition">No — I'm a visitor / Register</a>

            <form method="POST" action="{% url 'quick_checkin' event.id %}">
                {% csrf_token %}
                <input type="hidden" name="name" value="{{ typed_name }}">
                <input type="hidden" name="phone" value="{{ typed_phone }}">
                <button type="submit" class="w-full mt-2 bg-emerald-600 hover:bg-emerald-700 text-white font-medium p-3 rounded-lg transition">Not listed — Quick Check-in</button>
            </form>

            <div class="text-sm text-slate-500">Or <a href="{% url 'scan_landing' event.id %}" class="text-blue-600 underline">try again</a> to re-enter your details.</div>
        </div>
    </div>
</body>
</html>
